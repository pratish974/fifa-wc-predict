name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ] # Triggers when you push to main or master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps: deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # CHANGE THIS: If using React/Vite, use 'npm run build'. 
      # The output must generate a production folder (usually 'dist' or 'build')
      - name: Build Project
        run: npm run build

      # Configures the Pages deployment environment
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Uploads the built static files. 
      # CHANGE 'dist' below if your build folder is named 'build' or 'out'
      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' 

      # Deploys the uploaded artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4